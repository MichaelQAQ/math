<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学习日记管理 | Michael's Learning Lab</title>
  <meta name="description" content="Michael's Learning Lab 的学习日记卡片系统，支持 Markdown、封面、图片、视频和 PDF 附件。">
  <style>
    :root {
      color-scheme: dark;
      --ink: #eef2ff;
      --ink-soft: #cbd5e1;
      --muted: #9aa8bd;
      --quiet: #7c8798;
      --paper: #111827;
      --wash: #0b1020;
      --wash-strong: #141b2f;
      --line: rgba(255, 255, 255, .1);
      --line-strong: rgba(255, 255, 255, .2);
      --violet: #7c5df7;
      --blue: #3274e8;
      --navy: #101625;
      --shadow: 0 20px 50px rgba(0, 0, 0, .34);
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --serif: "Songti SC", "STSong", "Noto Serif SC", serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: var(--wash);
    }

    body {
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.68;
      letter-spacing: 0;
      background:
        radial-gradient(circle at 18% 10%, rgba(124, 93, 247, .18), transparent 26%),
        radial-gradient(circle at 86% 14%, rgba(32, 167, 168, .14), transparent 24%),
        linear-gradient(180deg, #0b1020 0%, #101827 54%, #0b1020 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(11, 16, 32, .78);
      backdrop-filter: blur(18px);
    }

    .nav,
    .section-inner {
      width: min(1180px, calc(100% - 44px));
      margin: 0 auto;
    }

    .nav {
      min-height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 950;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border: 2px solid var(--line-strong);
      border-radius: 12px;
      overflow: hidden;
      display: block;
      flex: 0 0 auto;
      background: var(--wash-strong);
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-title {
      display: block;
      font-size: 1rem;
      line-height: 1.2;
      white-space: nowrap;
    }

    .brand-subtitle {
      display: block;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 720;
      line-height: 1.25;
    }

    .link-pill,
    .modal-button {
      min-height: 38px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      background: rgba(255, 255, 255, .06);
      font: inherit;
      font-size: .86rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .18);
    }

    .modal-button {
      border-radius: 8px;
      box-shadow: none;
    }

    .modal-button.primary,
    .link-pill.primary {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(135deg, var(--violet), var(--blue));
    }

    .modal-button.danger {
      color: #ff5c5c;
      background: rgba(244, 63, 94, .08);
    }

    .hero {
      padding: 72px 0 34px;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      line-height: 1.08;
      font-weight: 950;
    }

    .hero h1::after {
      width: 58px;
      height: 4px;
      border-radius: 99px;
      display: block;
      margin: 14px auto 0;
      background: linear-gradient(90deg, var(--violet), var(--blue));
      content: "";
    }

    .hero p {
      max-width: 760px;
      margin: 24px auto 0;
      color: var(--muted);
      font-size: 1.02rem;
      font-weight: 760;
    }

    .diary-actions {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    main {
      padding-bottom: 60px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 18px;
    }

    .post-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .diary-card {
      cursor: pointer;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }

    .diary-card:hover,
    .diary-card:focus-visible {
      transform: translateY(-4px);
      border-color: var(--line-strong);
      outline: none;
    }

    .thumb {
      position: relative;
      min-height: 128px;
      aspect-ratio: 1.5;
      padding: 12px;
      display: flex;
      align-items: flex-end;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, 0)),
        linear-gradient(135deg, var(--tone, var(--violet)), var(--tone-deep, var(--blue)));
    }

    .thumb.math {
      background:
        radial-gradient(circle at 70% 32%, rgba(255, 255, 255, .18), transparent 18%),
        linear-gradient(135deg, #101625, #242536);
    }

    .thumb.music {
      background:
        repeating-linear-gradient(0deg, transparent 0 16px, rgba(255, 255, 255, .16) 17px, transparent 18px),
        linear-gradient(135deg, #94623e, #d97a22);
    }

    .thumb.reading {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .1), transparent),
        linear-gradient(135deg, #64748b, #b68c63);
    }

    .thumb.has-cover {
      background-position: center;
      background-size: cover;
    }

    .thumb.has-cover::after {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(16, 22, 37, .08), rgba(16, 22, 37, .48));
      content: "";
    }

    .thumb.has-cover .tag,
    .thumb.has-cover .media-badge {
      position: relative;
      z-index: 1;
    }

    .tag,
    .media-badge {
      width: max-content;
      max-width: 100%;
      padding: 4px 8px;
      border-radius: 6px;
      color: #fff;
      background: rgba(16, 22, 37, .58);
      font-size: .74rem;
      font-weight: 950;
      line-height: 1.1;
    }

    .media-badge {
      position: absolute;
      right: 12px;
      top: 12px;
      border-radius: 999px;
    }

    .card-body {
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .post-card h3 {
      color: var(--ink);
      font-size: 1rem;
      line-height: 1.35;
    }

    .post-card p {
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.55;
    }

    .date {
      color: var(--quiet);
      font-size: .78rem;
      font-weight: 800;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 2px;
    }

    .card-actions button {
      min-height: 32px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--wash-strong);
      font: inherit;
      font-size: .76rem;
      font-weight: 900;
      cursor: pointer;
    }

    .card-actions .danger {
      color: #ff5c5c;
      background: rgba(244, 63, 94, .08);
    }

    .empty-state {
      padding: 28px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      font-weight: 760;
    }

    .diary-dialog {
      width: min(940px, calc(100% - 28px));
      max-height: min(88vh, 900px);
      padding: 0;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      color: var(--ink);
      background: var(--paper);
      box-shadow: 0 30px 80px rgba(0, 0, 0, .48);
    }

    .diary-dialog::backdrop {
      background: rgba(11, 16, 32, .68);
      backdrop-filter: blur(8px);
    }

    .modal-shell {
      display: grid;
      max-height: min(88vh, 900px);
      overflow: auto;
    }

    .modal-header {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      background: rgba(17, 24, 39, .92);
      backdrop-filter: blur(16px);
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--wash-strong);
      font-size: 1.25rem;
      cursor: pointer;
    }

    .diary-form,
    .diary-viewer {
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .field-full {
      grid-column: 1 / -1;
    }

    .form-field {
      display: grid;
      gap: 7px;
      color: var(--ink-soft);
      font-size: .85rem;
      font-weight: 900;
    }

    .form-field input,
    .form-field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      color: var(--ink);
      background: var(--wash);
      font: inherit;
      font-size: .92rem;
      line-height: 1.45;
    }

    .form-field textarea {
      min-height: 210px;
      resize: vertical;
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    .helper-text {
      color: var(--muted);
      font-size: .8rem;
      font-weight: 650;
      line-height: 1.5;
    }

    .attachment-list {
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
      list-style: none;
    }

    .attachment-list li {
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      background: var(--wash);
      font-size: .82rem;
      font-weight: 760;
    }

    .attachment-list button {
      border: 0;
      color: #ff5c5c;
      background: transparent;
      font: inherit;
      font-weight: 950;
      cursor: pointer;
    }

    .form-actions,
    .viewer-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .viewer-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: .84rem;
      font-weight: 850;
    }

    .markdown-body {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink-soft);
      background: var(--wash);
    }

    .markdown-body h2,
    .markdown-body h3 {
      color: var(--ink);
      margin: 0 0 10px;
      line-height: 1.35;
    }

    .markdown-body p,
    .markdown-body ul {
      margin: 0 0 12px;
    }

    .markdown-body ul {
      padding-left: 1.15rem;
    }

    .markdown-body img {
      max-height: 360px;
      border-radius: 8px;
      border: 1px solid var(--line);
      margin: 12px 0;
      object-fit: contain;
      background: #fff;
    }

    .markdown-body code {
      padding: 2px 5px;
      border-radius: 5px;
      background: rgba(109, 93, 252, .18);
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .media-item {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--wash);
    }

    .media-item img,
    .media-item video,
    .media-item iframe {
      width: 100%;
      min-height: 220px;
      max-height: 420px;
      display: block;
      object-fit: contain;
      background: #0b1020;
    }

    .media-caption {
      padding: 10px 12px;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 820;
      overflow-wrap: anywhere;
    }

    @media (max-width: 1060px) {
      .card-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .nav,
      .section-inner {
        width: min(100% - 28px, 1180px);
      }

      .nav {
        align-items: flex-start;
        padding: 12px 0;
        display: grid;
      }

      .card-grid,
      .form-grid,
      .media-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="主导航">
      <a class="brand" href="../index.html#home">
        <span class="brand-mark" aria-hidden="true"><img src="../assets/site-logo.jpg" alt=""></span>
        <span>
          <span class="brand-title">Michael's Learning Lab</span>
          <span class="brand-subtitle">学习日记 · Markdown · 图文视频 PDF</span>
        </span>
      </a>
      <a class="link-pill" href="../index.html#records">返回主页</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="section-inner">
        <h1>学习日记</h1>
        <p>这里陈列全部日记卡片，并集中管理内容、封面、Markdown 正文、图片、视频和 PDF 附件。</p>
        <div class="diary-actions">
          <button class="link-pill primary" type="button" id="addDiaryButton">＋ 添加学习日记</button>
          <a class="link-pill" href="../index.html#records">查看主页预览</a>
        </div>
      </div>
    </section>

    <section aria-label="全部学习日记">
      <div class="section-inner">
        <div class="card-grid" id="diaryGrid" data-diary-mode="manage" aria-live="polite"></div>
        <p class="empty-state" id="diaryEmpty" hidden>还没有学习日记。点击上方按钮，添加第一张卡片。</p>
      </div>
    </section>
  </main>

  <dialog class="diary-dialog" id="diaryEditor">
    <div class="modal-shell">
      <div class="modal-header">
        <h3 id="diaryEditorTitle">添加学习日记</h3>
        <button class="modal-close" type="button" data-close-dialog="diaryEditor" aria-label="关闭">×</button>
      </div>
      <form class="diary-form" id="diaryForm">
        <input type="hidden" id="diaryId">
        <div class="form-grid">
          <label class="form-field">
            标题
            <input id="diaryTitleInput" type="text" placeholder="例如：今天理解了函数图像" required>
          </label>
          <label class="form-field">
            分类
            <input id="diaryCategoryInput" type="text" placeholder="数学 / 编程" required>
          </label>
          <label class="form-field">
            日期
            <input id="diaryDateInput" type="date" required>
          </label>
          <label class="form-field field-full">
            摘要
            <input id="diarySummaryInput" type="text" placeholder="写一句卡片上显示的小标题">
          </label>
          <label class="form-field field-full">
            卡片封面
            <input id="diaryCoverInput" type="file" accept="image/*">
            <span class="helper-text">上传一张图片作为日记卡片封面；不上传时使用系统配色封面。</span>
          </label>
          <label class="form-field field-full">
            Markdown 内容
            <textarea id="diaryMarkdownInput" placeholder="## 今天学了什么&#10;- 一个重要问题&#10;- 一个新的理解&#10;&#10;也可以写图片：![说明](图片地址)" required></textarea>
            <span class="helper-text">支持标题、列表、加粗、链接和 Markdown 图片。上传的图片、视频、PDF 会作为附件显示在详情里。</span>
          </label>
          <label class="form-field field-full">
            添加附件
            <input id="diaryFileInput" type="file" accept="image/*,video/*,application/pdf" multiple>
            <span class="helper-text">附件会保存到浏览器数据库中，适合在这台电脑上预览和设计。</span>
          </label>
        </div>
        <ul class="attachment-list" id="coverAttachmentList" aria-label="当前封面"></ul>
        <ul class="attachment-list" id="existingAttachmentList" aria-label="已有附件"></ul>
        <div class="form-actions">
          <button class="modal-button" type="button" data-close-dialog="diaryEditor">取消</button>
          <button class="modal-button primary" type="submit">保存日记</button>
        </div>
      </form>
    </div>
  </dialog>

  <dialog class="diary-dialog" id="diaryViewer">
    <div class="modal-shell">
      <div class="modal-header">
        <h3 id="viewerTitle">学习日记</h3>
        <button class="modal-close" type="button" data-close-dialog="diaryViewer" aria-label="关闭">×</button>
      </div>
      <article class="diary-viewer">
        <div class="viewer-meta" id="viewerMeta"></div>
        <div class="markdown-body" id="viewerMarkdown"></div>
        <div class="media-grid" id="viewerMedia"></div>
        <div class="viewer-actions">
          <button class="modal-button" type="button" id="viewerEditButton">编辑</button>
          <button class="modal-button danger" type="button" id="viewerDeleteButton">删除</button>
        </div>
      </article>
    </div>
  </dialog>

  <script>
    const diaryStorageKey = "michael-learning-lab-diaries-v1";
    const mediaDbName = "michael-learning-lab-media";
    const mediaStoreName = "attachments";
    let diaries = [];
    let editingRemovedAttachments = new Set();
    let editingCoverRemoved = false;
    let activeViewerId = null;
    let viewerObjectUrls = [];
    let coverObjectUrls = [];
    let mediaDbPromise = null;

    const defaultDiaries = [
      { id: "sample-a5", title: "A5 交错群为什么不可解？", category: "数学", date: "2026-05-20", summary: "从正规子群、商群和同态的角度，理解抽象代数里不可解群的意思。", thumbClass: "math", markdown: "## 今天的核心问题\nA5 交错群为什么不可解？\n\n- 先看正规子群结构。\n- 再看商群和同态如何限制可解性。\n- 最后把抽象代数里的“不可解”翻译成可以理解的结构语言。\n\n**收获：** 不可解不是“没有办法”，而是某种结构无法被逐层拆成交换群。", attachments: [] },
      { id: "sample-buffon", title: "布丰投针实验网页实现", category: "编程 / 数学", date: "2026-05-18", summary: "用 HTML 和 JavaScript 做随机模拟，理解 π 和概率之间的关系。", tone: "#f1c89b", toneDeep: "#df7e3b", markdown: "## 项目记录\n今天用网页模拟布丰投针实验。\n\n- 用随机数生成投针位置和角度。\n- 统计穿线次数。\n- 观察实验次数变多后，估计值如何接近 π。", attachments: [] },
      { id: "sample-complex", title: "复变函数 f(z)=z² 可视化", category: "数学 / 可视化", date: "2026-05-15", summary: "用动画展示复平面的局部变形，观察角度和尺度如何变化。", tone: "#101625", toneDeep: "#244165", markdown: "## 可视化想法\n把复平面上的网格输入到函数 f(z)=z² 中，观察图像怎样变形。\n\n- 原点附近被压缩。\n- 角度会翻倍。\n- 网格线变成更有曲率的结构。", attachments: [] },
      { id: "sample-plan", title: "小学五六年级三周计划", category: "教育", date: "2026-05-12", summary: "把学习节奏、任务记录和复盘安排放在一个清晰系统里。", tone: "#eceff8", toneDeep: "#b8bfd5", markdown: "## 计划重点\n三周计划要避免塞满任务，而是建立稳定节奏。\n\n- 每天有明确的小目标。\n- 每周有一次复盘。\n- 把作业、阅读、数学思考和表达练习分开记录。", attachments: [] },
      { id: "sample-swift", title: "学习 Swift 制作卡片 App", category: "编程 / Swift", date: "2026-05-10", summary: "记录学习笔记、关键词和复盘，用小应用整理学习线索。", tone: "#756df0", toneDeep: "#4c42b8", markdown: "## Swift 学习\n今天的目标是做一个卡片式学习 App 原型。\n\n- 卡片记录标题、关键词和复盘。\n- 列表负责浏览。\n- 详情页负责展开内容。", attachments: [] },
      { id: "sample-reading", title: "《思考，快与慢》读书笔记", category: "阅读", date: "2026-05-08", summary: "关于系统 1 与系统 2 的理解，整理常见判断偏误。", thumbClass: "reading", markdown: "## 阅读笔记\n系统 1 很快，系统 2 很慢，但真正困难的是知道什么时候需要慢下来。\n\n- 快速判断节省精力。\n- 慢速思考帮助检查偏误。\n- 学习时要给自己留出复盘空间。", attachments: [] }
    ];

    const tonePresets = [
      { pattern: /数学/, thumbClass: "math", tone: "#101625", toneDeep: "#242536" },
      { pattern: /编程|代码|Swift|Web/i, tone: "#756df0", toneDeep: "#4c42b8" },
      { pattern: /阅读|书/, thumbClass: "reading", tone: "#64748b", toneDeep: "#b68c63" },
      { pattern: /音乐|钢琴|小提琴/, thumbClass: "music", tone: "#94623e", toneDeep: "#d97a22" },
      { pattern: /科学|实验/, tone: "#26a4a6", toneDeep: "#147a82" },
      { pattern: /教育|教学/, tone: "#eceff8", toneDeep: "#b8bfd5" }
    ];

    const diaryGrid = document.getElementById("diaryGrid");
    const diaryEmpty = document.getElementById("diaryEmpty");
    const addDiaryButton = document.getElementById("addDiaryButton");
    const diaryEditor = document.getElementById("diaryEditor");
    const diaryViewer = document.getElementById("diaryViewer");
    const diaryForm = document.getElementById("diaryForm");
    const diaryIdInput = document.getElementById("diaryId");
    const diaryTitleInput = document.getElementById("diaryTitleInput");
    const diaryCategoryInput = document.getElementById("diaryCategoryInput");
    const diaryDateInput = document.getElementById("diaryDateInput");
    const diarySummaryInput = document.getElementById("diarySummaryInput");
    const diaryMarkdownInput = document.getElementById("diaryMarkdownInput");
    const diaryCoverInput = document.getElementById("diaryCoverInput");
    const diaryFileInput = document.getElementById("diaryFileInput");
    const diaryEditorTitle = document.getElementById("diaryEditorTitle");
    const coverAttachmentList = document.getElementById("coverAttachmentList");
    const existingAttachmentList = document.getElementById("existingAttachmentList");
    const viewerTitle = document.getElementById("viewerTitle");
    const viewerMeta = document.getElementById("viewerMeta");
    const viewerMarkdown = document.getElementById("viewerMarkdown");
    const viewerMedia = document.getElementById("viewerMedia");
    const viewerEditButton = document.getElementById("viewerEditButton");
    const viewerDeleteButton = document.getElementById("viewerDeleteButton");

    function cloneDefaultDiaries() {
      return defaultDiaries.map((diary) => ({ ...diary, attachments: [] }));
    }

    function loadDiaries() {
      try {
        const saved = JSON.parse(localStorage.getItem(diaryStorageKey) || "null");
        if (Array.isArray(saved)) return saved;
      } catch (error) {
        console.warn("Unable to load diary data", error);
      }
      const initial = cloneDefaultDiaries();
      localStorage.setItem(diaryStorageKey, JSON.stringify(initial));
      return initial;
    }

    function saveDiaries() {
      localStorage.setItem(diaryStorageKey, JSON.stringify(diaries));
    }

    function openMediaDb() {
      if (!("indexedDB" in window)) return Promise.resolve(null);
      if (!mediaDbPromise) {
        mediaDbPromise = new Promise((resolve, reject) => {
          const request = indexedDB.open(mediaDbName, 1);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(mediaStoreName)) db.createObjectStore(mediaStoreName, { keyPath: "id" });
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }
      return mediaDbPromise;
    }

    async function putAttachment(record) {
      const db = await openMediaDb();
      if (!db) return;
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(mediaStoreName, "readwrite");
        transaction.objectStore(mediaStoreName).put(record);
        transaction.oncomplete = resolve;
        transaction.onerror = () => reject(transaction.error);
      });
    }

    async function getAttachment(id) {
      const db = await openMediaDb();
      if (!db) return null;
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(mediaStoreName, "readonly");
        const request = transaction.objectStore(mediaStoreName).get(id);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error);
      });
    }

    async function deleteAttachment(id) {
      const db = await openMediaDb();
      if (!db) return;
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(mediaStoreName, "readwrite");
        transaction.objectStore(mediaStoreName).delete(id);
        transaction.oncomplete = resolve;
        transaction.onerror = () => reject(transaction.error);
      });
    }

    function escapeHtml(value) {
      return String(value || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function sanitizeUrl(value) {
      const url = String(value || "").trim();
      return /^(https?:|data:image\/|blob:|\.\/|\.\.\/|\/|assets\/)/i.test(url) ? escapeHtml(url) : "";
    }

    function renderInlineMarkdown(value) {
      let output = escapeHtml(value);
      output = output.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) => {
        const safeUrl = sanitizeUrl(url);
        return safeUrl ? `<img src="${safeUrl}" alt="${alt}">` : "";
      });
      output = output.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
        const safeUrl = sanitizeUrl(url);
        return safeUrl ? `<a href="${safeUrl}" target="_blank" rel="noopener">${text}</a>` : text;
      });
      output = output.replace(/`([^`]+)`/g, "<code>$1</code>");
      output = output.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      output = output.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      return output;
    }

    function renderMarkdown(markdown) {
      const lines = String(markdown || "").replace(/\r/g, "").split("\n");
      const html = [];
      let listItems = [];
      const flushList = () => {
        if (listItems.length) {
          html.push(`<ul>${listItems.map((item) => `<li>${item}</li>`).join("")}</ul>`);
          listItems = [];
        }
      };
      lines.forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed) {
          flushList();
          return;
        }
        const headingTwo = trimmed.match(/^##\s+(.+)/);
        const headingThree = trimmed.match(/^###\s+(.+)/);
        const list = trimmed.match(/^[-*]\s+(.+)/);
        if (headingTwo) {
          flushList();
          html.push(`<h2>${renderInlineMarkdown(headingTwo[1])}</h2>`);
        } else if (headingThree) {
          flushList();
          html.push(`<h3>${renderInlineMarkdown(headingThree[1])}</h3>`);
        } else if (list) {
          listItems.push(renderInlineMarkdown(list[1]));
        } else {
          flushList();
          html.push(`<p>${renderInlineMarkdown(trimmed)}</p>`);
        }
      });
      flushList();
      return html.join("");
    }

    function formatDate(date) {
      return date ? date.replaceAll("-", ".") : "";
    }

    function createDiaryId() {
      return `diary-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function getToneForCategory(category) {
      return tonePresets.find((preset) => preset.pattern.test(category || "")) || { tone: "#7c5df7", toneDeep: "#4f46e5" };
    }

    function getDiaryById(id) {
      return diaries.find((diary) => diary.id === id);
    }

    function clearCoverObjectUrls() {
      coverObjectUrls.forEach((url) => URL.revokeObjectURL(url));
      coverObjectUrls = [];
    }

    async function applyCoverImages() {
      clearCoverObjectUrls();
      const coverThumbs = Array.from(diaryGrid.querySelectorAll("[data-cover-id]"));
      for (const thumb of coverThumbs) {
        const stored = await getAttachment(thumb.dataset.coverId);
        if (!stored?.blob) continue;
        const url = URL.createObjectURL(stored.blob);
        coverObjectUrls.push(url);
        thumb.classList.add("has-cover");
        thumb.style.backgroundImage = `linear-gradient(180deg, rgba(16, 22, 37, .08), rgba(16, 22, 37, .48)), url("${url}")`;
      }
    }

    function renderDiaries() {
      const sorted = [...diaries].sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
      diaryGrid.innerHTML = sorted.map((diary) => {
        const tone = getToneForCategory(diary.category);
        const thumbClass = diary.thumbClass || tone.thumbClass || "";
        const toneStyle = `--tone: ${diary.tone || tone.tone}; --tone-deep: ${diary.toneDeep || tone.toneDeep}`;
        const attachmentCount = diary.attachments?.length || 0;
        const coverAttr = diary.coverId ? ` data-cover-id="${escapeHtml(diary.coverId)}"` : "";
        return `
          <article class="post-card diary-card" tabindex="0" data-diary-id="${escapeHtml(diary.id)}" aria-label="查看 ${escapeHtml(diary.title)}">
            <div class="thumb ${escapeHtml(thumbClass)}" style="${toneStyle}"${coverAttr}>
              <span class="tag">${escapeHtml(diary.category || "学习")}</span>
              ${attachmentCount ? `<span class="media-badge">${attachmentCount} 个附件</span>` : ""}
            </div>
            <div class="card-body">
              <h3>${escapeHtml(diary.title)}</h3>
              <p>${escapeHtml(diary.summary || "点击查看完整 Markdown 日记。")}</p>
              <time class="date">${formatDate(diary.date)}</time>
              <div class="card-actions" aria-label="日记管理">
                <button type="button" data-diary-action="view" data-diary-id="${escapeHtml(diary.id)}">查看</button>
                <button type="button" data-diary-action="edit" data-diary-id="${escapeHtml(diary.id)}">编辑</button>
                <button class="danger" type="button" data-diary-action="delete" data-diary-id="${escapeHtml(diary.id)}">删除</button>
              </div>
            </div>
          </article>
        `;
      }).join("");
      diaryEmpty.hidden = sorted.length > 0;
      applyCoverImages();
    }

    function renderExistingAttachments(diary) {
      const attachments = (diary?.attachments || []).filter((item) => !editingRemovedAttachments.has(item.id));
      existingAttachmentList.innerHTML = attachments.map((item) => `
        <li><span>${escapeHtml(item.name)} · ${escapeHtml(item.type || "file")}</span><button type="button" data-remove-attachment="${escapeHtml(item.id)}">移除</button></li>
      `).join("");
    }

    function renderCoverAttachment(diary) {
      const hasCover = diary?.coverId && !editingCoverRemoved;
      coverAttachmentList.innerHTML = hasCover ? `
        <li><span>当前封面 · ${escapeHtml(diary.coverName || "封面图片")}</span><button type="button" data-remove-cover="true">移除</button></li>
      ` : "";
    }

    function openEditor(id) {
      const diary = id ? getDiaryById(id) : null;
      editingRemovedAttachments = new Set();
      editingCoverRemoved = false;
      diaryEditorTitle.textContent = diary ? "编辑学习日记" : "添加学习日记";
      diaryIdInput.value = diary?.id || "";
      diaryTitleInput.value = diary?.title || "";
      diaryCategoryInput.value = diary?.category || "";
      diaryDateInput.value = diary?.date || new Date().toISOString().slice(0, 10);
      diarySummaryInput.value = diary?.summary || "";
      diaryMarkdownInput.value = diary?.markdown || "## 今天学到了什么\n- \n\n## 一个新的问题\n- \n\n## 下一步\n- ";
      diaryCoverInput.value = "";
      diaryFileInput.value = "";
      renderCoverAttachment(diary);
      renderExistingAttachments(diary);
      diaryEditor.showModal();
      diaryTitleInput.focus();
    }

    async function saveDiaryFromForm(event) {
      event.preventDefault();
      const id = diaryIdInput.value || createDiaryId();
      const previous = getDiaryById(id);
      const category = diaryCategoryInput.value.trim() || "学习";
      const tone = getToneForCategory(category);
      const attachments = (previous?.attachments || []).filter((item) => !editingRemovedAttachments.has(item.id));
      let coverId = previous?.coverId || "";
      let coverName = previous?.coverName || "";
      let coverType = previous?.coverType || "";

      for (const attachmentId of editingRemovedAttachments) await deleteAttachment(attachmentId);

      if (editingCoverRemoved && coverId) {
        await deleteAttachment(coverId);
        coverId = "";
        coverName = "";
        coverType = "";
      }

      const coverFile = diaryCoverInput.files?.[0];
      if (coverFile) {
        if (coverId) await deleteAttachment(coverId);
        coverId = `${id}-cover-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        coverName = coverFile.name;
        coverType = coverFile.type || "image/*";
        await putAttachment({ id: coverId, diaryId: id, role: "cover", name: coverName, type: coverType, size: coverFile.size, blob: coverFile });
      }

      for (const file of Array.from(diaryFileInput.files || [])) {
        const attachmentId = `${id}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        const metadata = { id: attachmentId, diaryId: id, name: file.name, type: file.type || "application/octet-stream", size: file.size };
        await putAttachment({ ...metadata, blob: file });
        attachments.push(metadata);
      }

      const diary = {
        id,
        title: diaryTitleInput.value.trim(),
        category,
        date: diaryDateInput.value,
        summary: diarySummaryInput.value.trim(),
        markdown: diaryMarkdownInput.value.trim(),
        thumbClass: tone.thumbClass || "",
        tone: tone.tone,
        toneDeep: tone.toneDeep,
        coverId,
        coverName,
        coverType,
        attachments
      };

      const existingIndex = diaries.findIndex((item) => item.id === id);
      if (existingIndex >= 0) diaries[existingIndex] = diary;
      else diaries.unshift(diary);
      saveDiaries();
      renderDiaries();
      diaryEditor.close();
    }

    function revokeViewerUrls() {
      viewerObjectUrls.forEach((url) => URL.revokeObjectURL(url));
      viewerObjectUrls = [];
    }

    async function renderAttachmentMedia(attachments) {
      revokeViewerUrls();
      const mediaItems = [];
      for (const attachment of attachments || []) {
        const stored = await getAttachment(attachment.id);
        if (!stored?.blob) {
          mediaItems.push(`<div class="media-item"><div class="media-caption">${escapeHtml(attachment.name)} 暂时无法读取</div></div>`);
          continue;
        }
        const url = URL.createObjectURL(stored.blob);
        viewerObjectUrls.push(url);
        const type = attachment.type || stored.type || "";
        let media = "";
        if (type.startsWith("image/")) media = `<img src="${url}" alt="${escapeHtml(attachment.name)}">`;
        else if (type.startsWith("video/")) media = `<video src="${url}" controls></video>`;
        else if (type === "application/pdf") media = `<iframe src="${url}" title="${escapeHtml(attachment.name)}"></iframe>`;
        else media = `<a class="link-pill" href="${url}" download="${escapeHtml(attachment.name)}">下载附件</a>`;
        mediaItems.push(`<div class="media-item">${media}<div class="media-caption">${escapeHtml(attachment.name)}</div></div>`);
      }
      viewerMedia.innerHTML = mediaItems.join("");
    }

    async function openViewer(id) {
      const diary = getDiaryById(id);
      if (!diary) return;
      activeViewerId = id;
      viewerTitle.textContent = diary.title;
      viewerMeta.innerHTML = `<span>${escapeHtml(diary.category || "学习")}</span><span>${formatDate(diary.date)}</span><span>${diary.attachments?.length || 0} 个附件</span>`;
      viewerMarkdown.innerHTML = renderMarkdown(diary.markdown || diary.summary || "");
      await renderAttachmentMedia(diary.attachments || []);
      diaryViewer.showModal();
    }

    async function deleteDiary(id) {
      const diary = getDiaryById(id);
      if (!diary) return;
      if (!window.confirm(`确定删除《${diary.title}》吗？`)) return;
      if (diary.coverId) await deleteAttachment(diary.coverId);
      for (const attachment of diary.attachments || []) await deleteAttachment(attachment.id);
      diaries = diaries.filter((item) => item.id !== id);
      saveDiaries();
      renderDiaries();
      if (diaryViewer.open) diaryViewer.close();
    }

    addDiaryButton.addEventListener("click", () => openEditor());
    diaryForm.addEventListener("submit", saveDiaryFromForm);
    diaryViewer.addEventListener("close", revokeViewerUrls);

    document.querySelectorAll("[data-close-dialog]").forEach((button) => {
      button.addEventListener("click", () => document.getElementById(button.dataset.closeDialog)?.close());
    });

    existingAttachmentList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-remove-attachment]");
      if (!button) return;
      editingRemovedAttachments.add(button.dataset.removeAttachment);
      renderExistingAttachments(getDiaryById(diaryIdInput.value));
    });

    coverAttachmentList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-remove-cover]");
      if (!button) return;
      editingCoverRemoved = true;
      renderCoverAttachment(getDiaryById(diaryIdInput.value));
    });

    diaryGrid.addEventListener("click", (event) => {
      const actionButton = event.target.closest("[data-diary-action]");
      const card = event.target.closest("[data-diary-id]");
      if (!card) return;
      const id = actionButton?.dataset.diaryId || card.dataset.diaryId;
      const action = actionButton?.dataset.diaryAction || "view";
      if (action === "edit") openEditor(id);
      else if (action === "delete") deleteDiary(id);
      else openViewer(id);
    });

    diaryGrid.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const card = event.target.closest("[data-diary-id]");
      if (!card || event.target.closest("button")) return;
      event.preventDefault();
      openViewer(card.dataset.diaryId);
    });

    viewerEditButton.addEventListener("click", () => {
      if (!activeViewerId) return;
      diaryViewer.close();
      openEditor(activeViewerId);
    });

    viewerDeleteButton.addEventListener("click", () => {
      if (activeViewerId) deleteDiary(activeViewerId);
    });

    diaries = loadDiaries();
    renderDiaries();

    const requestedId = new URLSearchParams(window.location.search).get("id");
    if (requestedId) {
      requestAnimationFrame(() => openViewer(requestedId));
    }
  </script>
